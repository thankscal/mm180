<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A321neo 病急亂投醫 — ECAM Quick Reference</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

:root {
  --bg: #0a0c0f;
  --panel: #0f1317;
  --panel2: #141820;
  --border: #1e2530;
  --border-bright: #2a3545;
  --amber: #f5a623;
  --amber-dim: #8a5d12;
  --green: #39d353;
  --green-dim: #1a5c28;
  --red: #e05252;
  --blue: #4db8ff;
  --blue-dim: #1a4060;
  --text: #c8d4e0;
  --text-dim: #5a6a7a;
  --text-bright: #eaf2ff;
  --accent: #f5a623;
  --warning-bg: #1a1200;
  --caution-bg: #0a1520;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCANLINE OVERLAY */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* TOP HEADER */
.header {
  background: linear-gradient(180deg, #111820 0%, #0a0c0f 100%);
  border-bottom: 1px solid var(--border-bright);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-logo {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
}

.header-title {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 20px;
  color: var(--text-bright);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.header-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
  flex: 1;
}

.warning-badge {
  background: var(--warning-bg);
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  padding: 4px 8px;
  letter-spacing: 1px;
  animation: blink 3s ease-in-out infinite;
}

@keyframes blink {
  0%, 90%, 100% { opacity: 1; }
  95% { opacity: 0.3; }
}

/* SEARCH BAR */
.search-bar {
  padding: 12px 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: center;
}

.search-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border-bright);
  color: var(--text-bright);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  padding: 8px 12px;
  outline: none;
  letter-spacing: 1px;
  transition: border-color 0.2s;
}

.search-input::placeholder { color: var(--text-dim); }
.search-input:focus { border-color: var(--amber); }

.search-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--amber);
  letter-spacing: 2px;
}

/* LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: calc(100vh - 100px);
}

/* SIDEBAR */
.sidebar {
  background: var(--panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  height: calc(100vh - 100px);
  position: sticky;
  top: 100px;
}

.sidebar-section {
  border-bottom: 1px solid var(--border);
}

.sidebar-section-header {
  padding: 10px 14px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--amber);
  background: rgba(245,166,35,0.05);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
  transition: background 0.15s;
}

.sidebar-section-header:hover { background: rgba(245,166,35,0.1); }

.sidebar-section-header .arrow {
  transition: transform 0.2s;
  font-size: 8px;
}

.sidebar-section-header.collapsed .arrow { transform: rotate(-90deg); }

.sidebar-items {
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.sidebar-items.collapsed { max-height: 0; }

.sidebar-item {
  padding: 7px 14px 7px 22px;
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
  border-left: 2px solid transparent;
  font-family: 'Noto Sans TC', sans-serif;
  letter-spacing: 0.3px;
}

.sidebar-item:hover {
  color: var(--text-bright);
  background: rgba(77,184,255,0.05);
  border-left-color: var(--blue);
}

.sidebar-item.active {
  color: var(--amber);
  background: rgba(245,166,35,0.08);
  border-left-color: var(--amber);
}

.sidebar-item .dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* MAIN CONTENT */
.main {
  overflow-y: auto;
  padding: 20px;
  background: var(--bg);
}

/* HOME PAGE */
.home-page {
  max-width: 900px;
}

.home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1px;
  background: var(--border);
  margin-bottom: 20px;
}

.chapter-card {
  background: var(--panel);
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}

.chapter-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--amber-dim);
  transition: background 0.15s;
}

.chapter-card:hover {
  background: var(--panel2);
}
.chapter-card:hover::before { background: var(--amber); }

.chapter-card .me-code {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.chapter-card .me-title {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
  line-height: 1.3;
}

.chapter-card .me-count {
  margin-top: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
}

/* AIRCRAFT INFO */
.ac-info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.ac-card {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 12px 16px;
}

.ac-card-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.ac-table {
  width: 100%;
  font-size: 12px;
}

.ac-table tr td:first-child {
  color: var(--text-dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  padding-right: 12px;
  width: 80px;
  letter-spacing: 0.5px;
}

.ac-table tr td:last-child {
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
}

.ac-table tr { border-bottom: 1px solid var(--border); }
.ac-table tr:last-child { border: none; }
.ac-table tr td { padding: 5px 0; }

/* DETAIL PAGE */
.detail-page {}

.detail-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  margin-bottom: 16px;
  transition: color 0.15s;
  letter-spacing: 1px;
}
.detail-back:hover { color: var(--amber); }

.detail-header {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.detail-me-tag {
  background: var(--warning-bg);
  border: 1px solid var(--amber-dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--amber);
  padding: 4px 8px;
  letter-spacing: 2px;
  white-space: nowrap;
  flex-shrink: 0;
}

.detail-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 2px;
  text-transform: uppercase;
  line-height: 1.2;
}

.detail-sub {
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'Share Tech Mono', monospace;
  margin-top: 4px;
  letter-spacing: 1px;
}

/* ALERT CARDS */
.alert-grid {
  display: grid;
  gap: 1px;
  background: var(--border);
}

.alert-card {
  background: var(--panel);
  transition: background 0.15s;
}

.alert-card-header {
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background 0.15s;
}

.alert-card-header:hover { background: var(--panel2); }

.alert-name {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--amber);
  letter-spacing: 1.5px;
  flex: 1;
}

.alert-chevron {
  color: var(--text-dim);
  font-size: 10px;
  transition: transform 0.2s;
  flex-shrink: 0;
}

.alert-card.open .alert-chevron { transform: rotate(90deg); }

.alert-body {
  display: none;
  padding: 0 16px 16px;
  background: var(--panel2);
  border-top: 1px solid var(--border);
}

.alert-card.open .alert-body { display: block; }

/* SECTIONS INSIDE ALERT */
.info-section {
  margin-top: 14px;
}

.info-section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.info-section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-bright);
}

.fcom-box {
  background: rgba(10,21,32,0.8);
  border-left: 3px solid var(--blue-dim);
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text);
  line-height: 1.7;
  font-family: 'Noto Sans TC', sans-serif;
}

.cb-table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
}

.cb-table th {
  background: rgba(245,166,35,0.08);
  color: var(--amber);
  font-size: 9px;
  letter-spacing: 2px;
  text-align: left;
  padding: 6px 10px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--amber-dim);
}

.cb-table td {
  padding: 5px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}

.cb-table td:first-child { color: var(--amber); }
.cb-table td:nth-child(3) { color: var(--green); }
.cb-table td:last-child { color: var(--blue); font-weight: 700; }

.cb-table tr:hover td { background: rgba(77,184,255,0.04); }

.cb-group-header {
  background: rgba(0,0,0,0.3);
  color: var(--text-dim);
  font-size: 9px;
  letter-spacing: 2px;
  padding: 4px 10px;
  text-transform: uppercase;
  font-style: italic;
}

.test-box {
  background: rgba(57,211,83,0.05);
  border-left: 3px solid var(--green-dim);
  padding: 10px 12px;
  font-size: 11px;
  color: var(--text);
  line-height: 1.7;
  font-family: 'Share Tech Mono', monospace;
  letter-spacing: 0.3px;
}

.eon-box {
  background: rgba(224,82,82,0.05);
  border-left: 3px solid var(--red);
  padding: 10px 12px;
  font-size: 11px;
  color: var(--text);
  line-height: 1.7;
  font-family: 'Noto Sans TC', sans-serif;
}

.reset-box {
  background: rgba(77,184,255,0.05);
  border-left: 3px solid var(--blue-dim);
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 10px 12px;
  font-size: 11px;
  color: var(--text);
  line-height: 1.9;
  font-family: 'Share Tech Mono', monospace;
  letter-spacing: 0.5px;
}

.reset-box strong {
  color: var(--blue);
  font-weight: 600;
}

/* STATUS BAR */
.status-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 4px 20px;
  display: flex;
  gap: 20px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
  z-index: 100;
}

.status-item { display: flex; align-items: center; gap: 6px; }
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* SEARCH RESULTS */
.search-result-item {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.search-result-item:hover { background: var(--panel2); }
.search-result-item .res-name {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--amber);
  letter-spacing: 1px;
}
.search-result-item .res-chapter {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
  font-family: 'Noto Sans TC', sans-serif;
}
.res-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  background: rgba(245,166,35,0.1);
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  padding: 2px 6px;
  letter-spacing: 1px;
  flex-shrink: 0;
}

.page { display: none; }
.page.active { display: block; }

/* WATER LEVEL TABLE */
.water-table {
  border-collapse: collapse;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
}
.water-table td { padding: 6px 16px; border: 1px solid var(--border); }
.water-table td:first-child { color: var(--amber); }
.water-table td:last-child { color: var(--green); }

/* HIGHLIGHT */
.highlight { color: var(--amber); font-weight: 600; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-bright); }
::-webkit-scrollbar-thumb:hover { background: var(--amber-dim); }

.no-cb {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  font-style: italic;
  padding: 6px 0;
}

.tag-warning {
  display: inline-block;
  background: rgba(224,82,82,0.12);
  border: 1px solid var(--red);
  color: var(--red);
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  padding: 2px 6px;
  letter-spacing: 1px;
  margin-right: 4px;
}

.search-empty {
  padding: 40px;
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 2px;
}
</style>
</head>

// ============================================================
// APP STATE
// ============================================================
let currentPage = 'home';
let currentChapter = null;
let searchQuery = '';

// ============================================================
// RENDER SIDEBAR
// ============================================================
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  
  let html = `
    <div class="sidebar-section">
      <div class="sidebar-section-header" onclick="navHome()">
        <span>▣ HOME / AIRCRAFT INFO</span>
      </div>
    </div>
  `;

  chapters.forEach(ch => {
    const chAlerts = alerts.filter(a => a.chapter === ch.code);
    const id = ch.code.replace(/[^a-zA-Z0-9]/g,'_');
    html += `
      <div class="sidebar-section">
        <div class="sidebar-section-header" id="hdr_${id}" onclick="toggleSection('${id}')">
          <span>${ch.code} ${ch.title}</span>
          <span class="arrow">▾</span>
        </div>
        <div class="sidebar-items" id="items_${id}">
          ${chAlerts.map(a => `
            <div class="sidebar-item" id="si_${a.id}" onclick="showAlert('${a.id}')">
              <span class="dot"></span>
              <span>${a.name}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });

  sidebar.innerHTML = html;
}

function toggleSection(id) {
  const hdr = document.getElementById('hdr_'+id);
  const items = document.getElementById('items_'+id);
  hdr.classList.toggle('collapsed');
  items.classList.toggle('collapsed');
}

function setActiveSidebarItem(alertId) {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('si_'+alertId);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({block:'nearest'});
  }
}

// ============================================================
// NAV
// ============================================================
function navHome() {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.getElementById('main-home').classList.add('active');
  document.getElementById('main-chapter').classList.remove('active');
  document.getElementById('main-search').classList.remove('active');
  document.getElementById('main-home').scrollIntoView();
  document.getElementById('mainContent').scrollTop = 0;
}

function showChapter(code) {
  const ch = chapters.find(c => c.code === code);
  if (!ch) return;
  const chAlerts = alerts.filter(a => a.chapter === code);
  
  const content = document.getElementById('main-chapter');
  content.innerHTML = `
    <div class="detail-page">
      <div class="detail-back" onclick="navHome()">← BACK TO HOME</div>
      <div class="detail-header">
        <div class="detail-me-tag">${ch.code}</div>
        <div>
          <div class="detail-title">${ch.title}</div>
          <div class="detail-sub">${chAlerts.length} ALERT(S) — CLICK TO EXPAND</div>
        </div>
      </div>
      <div class="alert-grid">
        ${chAlerts.map(a => renderAlertCard(a)).join('')}
      </div>
    </div>
  `;
  
  document.getElementById('main-home').classList.remove('active');
  document.getElementById('main-chapter').classList.add('active');
  document.getElementById('main-search').classList.remove('active');
  document.getElementById('mainContent').scrollTop = 0;
}

function showAlert(alertId, fromSearch) {
  const a = alerts.find(x => x.id === alertId);
  if (!a) return;
  
  setActiveSidebarItem(alertId);
  showChapter(a.chapter);
  
  setTimeout(() => {
    const card = document.getElementById('card_'+alertId);
    if (card) {
      card.scrollIntoView({behavior:'smooth', block:'start'});
      openCard(alertId);
    }
  }, 50);
}

// ============================================================
// ALERT CARD RENDER
// ============================================================
function renderAlertCard(a) {
  const hasCB = a.cb && a.cb.length > 0;
  
  let cbHtml = '';
  if (hasCB) {
    let grouped = {};
    a.cb.forEach(c => {
      if (!grouped[c.panel]) grouped[c.panel] = [];
      grouped[c.panel].push(c);
    });
    
    cbHtml = `<table class="cb-table"><thead><tr><th>PANEL</th><th>DESIGNATION</th><th>FIN</th><th>LOC</th></tr></thead><tbody>`;
    Object.keys(grouped).forEach(panel => {
      grouped[panel].forEach(c => {
        cbHtml += `<tr><td>${panel}</td><td>${c.des}</td><td>${c.fin}</td><td>${c.loc}</td></tr>`;
      });
    });
    cbHtml += `</tbody></table>`;
  } else {
    cbHtml = `<div class="no-cb">N/A</div>`;
  }

  const fcomText = a.fcom ? a.fcom.replace(/\n/g,'<br>') : 'Refer FCOM';
  const testText = a.test ? a.test.replace(/\n/g,'<br>') : 'Refer TSM';
  
  return `
    <div class="alert-card" id="card_${a.id}">
      <div class="alert-card-header" onclick="toggleCard('${a.id}')">
        <div class="alert-name">${a.name}</div>
        <div class="alert-chevron">▶</div>
      </div>
      <div class="alert-body">
        <div class="info-section">
          <div class="info-section-label">FCOM — TRIGGER CONDITION</div>
          <div class="fcom-box">${fcomText}</div>
        </div>
        
        <div class="info-section">
          <div class="info-section-label">CIRCUIT BREAKERS</div>
          ${cbHtml}
        </div>
        
        <div class="info-section">
          <div class="info-section-label">TEST / BITE</div>
          <div class="test-box">${testText}</div>
        </div>
        
        ${a.reset ? `
        <div class="info-section">
          <div class="info-section-label" style="color:var(--amber)">RESET PROCEDURE</div>
          <div class="reset-box">${a.reset.replace(/\n/g,'<br>')}</div>
        </div>` : ''}
        
        ${a.eon ? `
        <div class="info-section">
          <div class="info-section-label" style="color:var(--red)">⚠ EON / TFU</div>
          <div class="eon-box">${a.eon.replace(/\n/g,'<br>')}</div>
        </div>` : ''}
      </div>
    </div>
  `;
}

function toggleCard(alertId) {
  const card = document.getElementById('card_'+alertId);
  if (card) card.classList.toggle('open');
}

function openCard(alertId) {
  const card = document.getElementById('card_'+alertId);
  if (card) card.classList.add('open');
}

// ============================================================
// SEARCH
// ============================================================
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (q.length < 2) {
    if (currentPage !== 'home' && currentPage !== 'chapter') navHome();
    return;
  }
  doSearch(q);
});

function doSearch(q) {
  const results = alerts.filter(a => 
    a.name.toLowerCase().includes(q) ||
    (a.fcom && a.fcom.toLowerCase().includes(q)) ||
    (a.eon && a.eon.toLowerCase().includes(q)) ||
    (a.reset && a.reset.toLowerCase().includes(q))
  );

  const searchDiv = document.getElementById('main-search');
  const chMap = {};
  chapters.forEach(c => chMap[c.code] = c.title);

  if (results.length === 0) {
    searchDiv.innerHTML = `<div class="search-empty">NO RESULTS FOR "${q.toUpperCase()}"</div>`;
  } else {
    searchDiv.innerHTML = `
      <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);padding:10px 14px;letter-spacing:2px;border-bottom:1px solid var(--border);">
        ${results.length} RESULT(S) FOR "${q.toUpperCase()}"
      </div>
      ${results.map(a => `
        <div class="search-result-item" onclick="showAlert('${a.id}', true)">
          <div style="flex:1">
            <div class="res-name">${a.name}</div>
            <div class="res-chapter">${a.chapter} — ${chMap[a.chapter]||'Other'}</div>
          </div>
          <div class="res-badge">${a.chapter}</div>
        </div>
      `).join('')}
    `;
  }

  document.getElementById('main-home').classList.remove('active');
  document.getElementById('main-chapter').classList.remove('active');
  document.getElementById('main-search').classList.add('active');
}

// ============================================================
// INIT
// ============================================================
function init() {
  // Build sidebar
  renderSidebar();
  
  // Build main areas
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div id="main-home" class="page active">${renderHome()}</div>
    <div id="main-chapter" class="page"></div>
    <div id="main-search" class="page"></div>
  `;
  
  // Collapse all sidebar sections by default except first few
  chapters.forEach((ch, i) => {
    const id = ch.code.replace(/[^a-zA-Z0-9]/g,'_');
    if (i > 2) {
      const hdr = document.getElementById('hdr_'+id);
      const items = document.getElementById('items_'+id);
      if (hdr && items) {
        hdr.classList.add('collapsed');
        items.classList.add('collapsed');
      }
    }
  });
}

window.addEventListener('DOMContentLoaded', init);
